# ClusterIP — the API is not exposed directly to the internet.
# All external traffic reaches it via the Ingress (path /api).
apiVersion: v1
kind: Service
metadata:
  name: ctoaster-api-service
  namespace: ctoaster
  labels:
    app: ctoaster-api
spec:
  selector:
    app: ctoaster-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
