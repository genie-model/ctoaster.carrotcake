apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ctoaster-api-hpa
  namespace: ctoaster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ctoaster-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      # Avoid thrashing — wait 5 minutes of sustained low load before scaling down
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
