# ---------------------------------------------------------------------------
# Stateless API Deployment
#
# Before applying:
#   1. Create the DB credentials secret:
#        kubectl -n ctoaster create secret generic ctoaster-secrets \
#          --from-literal=db-url='postgresql://ctoaster_user:<PASSWORD>@127.0.0.1:5432/ctoaster' \
#          --from-literal=jwt-secret='<RANDOM_32_BYTE_HEX>'
#
#   2. Replace <PROJECT_ID> and v2.0.0 with real values, or use
#      envsubst / a CD pipeline to inject them at deploy time.
#
#   3. If using Cloud SQL Auth Proxy, replace 
#      in the cloudsql-proxy sidecar args below.
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctoaster-api
  namespace: ctoaster
  labels:
    app: ctoaster-api
spec:
  # Replica count is intentionally low here; the HPA in api-hpa.yaml will
  # scale it up under load.  Do NOT set replicas + HPA on the same field or
  # ArgoCD / Flux will fight the autoscaler; omit replicas and let the HPA own it.
  selector:
    matchLabels:
      app: ctoaster-api
  template:
    metadata:
      labels:
        app: ctoaster-api
    spec:
      serviceAccountName: ctoaster-api

      containers:
        # -----------------------------------------------------------------------
        # Main API container
        # -----------------------------------------------------------------------
        - name: api
          image: us-west2-docker.pkg.dev/ucr-ursa-major-ridgwell-lab/cupcake/ctoaster-backend:v2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          command: ["uvicorn", "tools.REST:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: ctoaster-secrets
                  key: db-url
            - name: CTOASTER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ctoaster-secrets
                  key: jwt-secret
            - name: FILESTORE_ROOT
              value: "/ctoaster-filestore"
            # Image used by k8s_jobs.py when creating runner Job pods.
            # Keep in sync with the image tag above.
            - name: RUNNER_IMAGE
              value: "us-west2-docker.pkg.dev/ucr-ursa-major-ridgwell-lab/cupcake/ctoaster-backend:v2.0.0"
            - name: K8S_NAMESPACE
              value: "ctoaster"
          volumeMounts:
            - name: filestore-volume
              mountPath: /ctoaster-filestore
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

        # -----------------------------------------------------------------------
        # Cloud SQL Auth Proxy sidecar
        # Connects to Cloud SQL so the API (and init container above) can reach
        # Postgres at 127.0.0.1:5432.
        #
        # Authentication uses a downloaded SA key file mounted from the
        # "cloudsql-sa-key" secret (created in Step 12 of the deployment guide).
        # -----------------------------------------------------------------------
        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--credentials-file=/secrets/cloudsql/key.json"
            - "ucr-ursa-major-ridgwell-lab:us-west2:ctoaster-db"
          securityContext:
            runAsNonRoot: true
          volumeMounts:
            - name: cloudsql-sa-key
              mountPath: /secrets/cloudsql
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: filestore-volume
          persistentVolumeClaim:
            claimName: ctoaster-filestore-pvc
        - name: cloudsql-sa-key
          secret:
            secretName: cloudsql-sa-key
