# ClusterIP — traffic arrives via the Ingress, not a public LoadBalancer.
apiVersion: v1
kind: Service
metadata:
  name: ctoaster-frontend-service
  namespace: ctoaster
  labels:
    app: ctoaster-frontend
spec:
  selector:
    app: ctoaster-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
