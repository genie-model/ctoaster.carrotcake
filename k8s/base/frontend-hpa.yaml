apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ctoaster-frontend-hpa
  namespace: ctoaster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ctoaster-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
